version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: gazi_user
      POSTGRES_PASSWORD: gazi_password
      POSTGRES_DB: gazi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: ./app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://gazi_user:gazi_password@db:5432/gazi_db
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:
